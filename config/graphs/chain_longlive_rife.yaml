nodes:
  - id: input
    type: source
    source_mode: video_file
    source_name: /data/videos/gradient_512x512_30s.mp4
  - id: longlive
    type: pipeline
    pipeline_id: longlive
  - id: rife
    type: pipeline
    pipeline_id: rife
  - id: output
    type: sink
edges:
  - from: input
    from_port: video
    to_node: longlive
    to_port: video
    kind: stream
  - from: longlive
    from_port: video
    to_node: rife
    to_port: video
    kind: stream
  - from: rife
    from_port: video
    to_node: output
    to_port: video
    kind: stream
