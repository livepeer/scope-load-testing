services:
  harness:
    build:
      context: .
      dockerfile: Dockerfile.harness
    image: scope-loadtest-harness
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    environment:
      - DAYDREAM_API_KEY=${DAYDREAM_API_KEY}
      - SDK_URL=${SDK_URL:-https://sdk.daydream.monster}
    restart: unless-stopped
