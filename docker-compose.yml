services:
  harness:
    build:
      context: .
      dockerfile: Dockerfile.harness
    image: scope-loadtest-harness
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    env_file: .env
    environment:
      - SDK_URL=${SDK_URL:-https://sdk.daydream.monster}
    restart: unless-stopped
    # Default: run the scheduler daemon
    # Override with: docker compose run harness run --scenario longlive_v2v_1m
